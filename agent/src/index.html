<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR360 Agent</title>
    <!-- Include Supabase JS from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <main class="container">
      <div id="login-screen">
        <div class="logo">
          <h1>HR 360</h1>
          <p>Time Tracking Agent</p>
        </div>
        
        <form id="login-form">
          <div class="input-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter your work email" required />
          </div>
          
          <div class="input-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password" required />
          </div>
          
          <button type="submit" id="login-btn">Log In & Connect</button>
          
          <p id="error-msg" class="error hidden"></p>
        </form>
      </div>

      <div id="success-screen" class="hidden">
        <div class="success-icon">✓</div>
        <h2>Connected!</h2>
        <p>The agent is now running in the background.</p>
        <p class="small">You can safely close this window. Look for the HR360 icon in your system tray.</p>
        <button id="hide-btn">Hide Window</button>
      </div>
    </main>
  </body>
</html>
